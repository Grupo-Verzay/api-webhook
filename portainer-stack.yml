version: "3.8"

services:
  api-webhook-verzay:
    image: ghcr.io/alexmorer/api-webhook:latest
    container_name: api-webhook-verzay
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      NODE_ENV: production
      PORT: 5001

      DATABASE_URL: ${DATABASE_URL}

      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_RESEND_KEY: ${AUTH_RESEND_KEY}
      NEXTAUTH_URL: ${NEXTAUTH_URL}

      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET}

      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}

      FOLLOW_UP_RUNNER_ENABLED: ${FOLLOW_UP_RUNNER_ENABLED:-false}
      FOLLOW_UP_RUNNER_INTERVAL_MS: ${FOLLOW_UP_RUNNER_INTERVAL_MS:-60000}
      FOLLOW_UP_RUNNER_LIMIT: ${FOLLOW_UP_RUNNER_LIMIT:-25}
      FOLLOW_UP_RUNNER_KEY: ${FOLLOW_UP_RUNNER_KEY:-}

      CRM_FOLLOW_UP_RUNNER_ENABLED: ${CRM_FOLLOW_UP_RUNNER_ENABLED:-false}
      CRM_FOLLOW_UP_RUNNER_INTERVAL_MS: ${CRM_FOLLOW_UP_RUNNER_INTERVAL_MS:-60000}
      CRM_FOLLOW_UP_RUNNER_LIMIT: ${CRM_FOLLOW_UP_RUNNER_LIMIT:-25}
      CRM_FOLLOW_UP_RUNNER_KEY: ${CRM_FOLLOW_UP_RUNNER_KEY:-}

      BILLING_CRON_ENABLED: ${BILLING_CRON_ENABLED:-false}
      BILLING_CRON_INTERVAL_MS: ${BILLING_CRON_INTERVAL_MS:-60000}
      BILLING_CRON_HOUR: ${BILLING_CRON_HOUR:-10}
      BILLING_CRON_MINUTE: ${BILLING_CRON_MINUTE:-0}
      BILLING_CRON_TIME_ZONE: ${BILLING_CRON_TIME_ZONE:-America/Bogota}
      BILLING_CRON_ENDPOINT_URL: ${BILLING_CRON_ENDPOINT_URL:-}
      BILLING_CRON_SECRET: ${BILLING_CRON_SECRET:-}
      BILLING_CRON_RUNNER_KEY: ${BILLING_CRON_RUNNER_KEY:-}
      BILLING_CRON_TIMEOUT_MS: ${BILLING_CRON_TIMEOUT_MS:-20000}

    # Si usas una red externa en Portainer/Traefik/Nginx, descomenta esto.
    # networks:
    #   - proxy

# networks:
#   proxy:
#     external: true
