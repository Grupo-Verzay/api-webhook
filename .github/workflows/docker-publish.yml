name: Build and Push Docker Image

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/grupo-verzay/api-webhook:latest

      - name: Deploy via Portainer webhook
        run: |
          curl -s -X POST "https://panel-n8n.ia-app.com/api/webhooks/28f107d6-c2b0-4a98-8392-820feae54900"
          echo "Portainer webhook triggered"
