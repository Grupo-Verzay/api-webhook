name: Build and Push Docker Image

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/grupo-verzay/api-webhook:latest

      - name: Deploy via Portainer webhook
        run: |
          # Capturamos el código HTTP y fallamos en rojo si Portainer no responde
          # 2xx (con "curl -s" a secas un 4xx/5xx pasaba desapercibido).
          code=$(curl -sS -o /tmp/portainer_resp.txt -w "%{http_code}" \
            -X POST "https://panel-n8n.ia-app.com/api/webhooks/42e0e628-b0e6-4f2d-9509-fd959b37d5e6")
          echo "Portainer respondió HTTP $code"
          echo "Cuerpo: $(cat /tmp/portainer_resp.txt)"
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::error::El webhook de Portainer falló (HTTP $code). El redespliegue NO ocurrió."
            exit 1
          fi
          echo "Webhook de Portainer aceptado (HTTP $code)."
